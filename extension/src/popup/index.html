<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Easily</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: rgba(246, 246, 248, 1);
      color: #1c1c1e;
      font-size: 13px;
    }
    .header {
      padding: 16px 16px 12px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 11px;
      color: rgba(0,0,0,0.45);
      margin-top: 2px;
    }
    .section {
      padding: 12px 16px;
      background: white;
      margin: 8px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(0,0,0,0.35);
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .row:last-child { margin-bottom: 0; }
    label { font-size: 12px; color: #1c1c1e; }
    input[type="number"], input[type="text"], input[type="password"] {
      width: 120px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: "SF Mono", "Menlo", monospace;
      outline: none;
      color: #1c1c1e;
      background: rgba(246,246,248,1);
      transition: border-color 0.15s;
    }
    input:focus { border-color: #007AFF; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      display: inline-block;
      margin-right: 5px;
    }
    .status-dot.ok { background: #34C759; }
    .status-text { font-size: 12px; }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #007AFF; color: white; }
    .activate-section {
      padding: 12px 8px 0;
    }
    .btn-activate {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: #007AFF;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .btn-activate:hover { opacity: 0.88; }
    .btn-activate:active { opacity: 0.72; }
    .btn-activate svg { flex-shrink: 0; }
    .shortcut-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(0,0,0,0.5);
      margin-bottom: 5px;
    }
    .key {
      background: rgba(0,0,0,0.06);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Design Easily</h1>
    <p>可视化设计改稿 + AI 编码助手</p>
  </div>

  <div class="activate-section">
    <button class="btn-activate" id="activateBtn">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="10 8 16 12 10 16"/>
      </svg>
      在此页面启用
    </button>
  </div>

  <div class="section">
    <p class="section-title">服务连接</p>
    <div class="row">
      <label>本地服务端口</label>
      <input type="number" id="port" value="3771" min="1024" max="65535" />
    </div>
    <div class="row">
      <label>状态</label>
      <span><span class="status-dot" id="statusDot"></span><span class="status-text" id="statusText">检测中...</span></span>
    </div>
  </div>

  <div class="section">
    <p class="section-title">AI 设置</p>
    <div class="row">
      <label>模型</label>
      <select id="model" style="border:1px solid rgba(0,0,0,0.12);border-radius:7px;padding:5px 8px;font-size:12px;background:rgba(246,246,248,1);outline:none;">
        <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
        <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
        <option value="gpt-4o">GPT-4o</option>
        <option value="gpt-4o-mini">GPT-4o mini</option>
      </select>
    </div>
  </div>

  <div class="section">
    <p class="section-title">快捷键</p>
    <div class="shortcut-row"><span>检查模式</span><span class="key">I</span></div>
    <div class="shortcut-row"><span>编辑模式</span><span class="key">E</span></div>
    <div class="shortcut-row"><span>标尺模式</span><span class="key">R</span></div>
    <div class="shortcut-row"><span>评论模式</span><span class="key">C</span></div>
    <div class="shortcut-row"><span>隐藏/显示面板</span><span class="key">Tab</span></div>
    <div class="shortcut-row"><span>复制 AI Prompt</span><span class="key">⌘⇧C</span></div>
    <div class="shortcut-row"><span>导出 JSON</span><span class="key">⌘⇧E</span></div>
  </div>

  <script src="popup.ts" type="module"></script>
</body>
</html>
